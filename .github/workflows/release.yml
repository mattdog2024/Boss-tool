name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            msystem: UCRT64
            packages: mingw-w64-ucrt-x86_64-gcc
            boss_exe: BossTool.exe
            acl_exe: FixACLUltimate.exe
            killer_exe: BossToolKiller.exe
          - arch: x86
            msystem: MINGW32
            packages: mingw-w64-i686-gcc
            boss_exe: BossTool_x86.exe
            acl_exe: FixACLUltimate_x86.exe
            killer_exe: BossToolKiller_x86.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.packages }}

      - name: Build ${{ matrix.arch }} binaries
        shell: msys2 {0}
        run: |
          gcc -O2 -municode -mwindows -o "${{ matrix.boss_exe }}" main.c -lws2_32 -liphlpapi -ladvapi32 -lshell32 -lcomctl32 -lshlwapi -lole32 -static
          gcc -O2 -municode -mwindows -o "${{ matrix.acl_exe }}" fix_acl_ultimate.c -ladvapi32 -lshell32 -static
          gcc -O2 -municode -mwindows -o "${{ matrix.killer_exe }}" BossToolKiller.c -ladvapi32 -lshell32 -luser32 -lntdll -static
          gcc -O2 -municode -mwindows -o "BossToolForceExit.exe" forcexit.c -ladvapi32 -lshell32 -luser32 -lkernel32 -lntdll -static
          gcc -O2 -municode -mwindows -o "BossToolForceExit_x86.exe" forcexit.c -ladvapi32 -lshell32 -luser32 -lkernel32 -lntdll -static

      - name: Upload ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossTool-${{ github.ref_name }}-${{ matrix.arch }}
          path: |
            ${{ matrix.boss_exe }}
            ${{ matrix.acl_exe }}
            ${{ matrix.killer_exe }}

  release:
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item artifacts\BossTool-${{ github.ref_name }}-x64\BossTool.exe dist\BossTool.exe
          Copy-Item artifacts\BossTool-${{ github.ref_name }}-x64\FixACLUltimate.exe dist\FixACLUltimate.exe
          Copy-Item artifacts\BossTool-${{ github.ref_name }}-x64\BossToolKiller.exe dist\BossToolKiller.exe
          Copy-Item artifacts\BossTool-${{ github.ref_name }}-x86\BossTool_x86.exe dist\BossTool_x86.exe
          Copy-Item artifacts\BossTool-${{ github.ref_name }}-x86\FixACLUltimate_x86.exe dist\FixACLUltimate_x86.exe
          Copy-Item artifacts\BossTool-${{ github.ref_name }}-x86\BossToolKiller_x86.exe dist\BossToolKiller_x86.exe
          Copy-Item README.md dist\README.md
          Compress-Archive -Path dist\* -DestinationPath BossTool-${{ github.ref_name }}-windows.zip -Force
          Copy-Item dist\BossTool.exe BossTool.exe
          Copy-Item dist\BossTool_x86.exe BossTool_x86.exe
          Copy-Item dist\FixACLUltimate.exe FixACLUltimate.exe
          Copy-Item dist\FixACLUltimate_x86.exe FixACLUltimate_x86.exe
          Copy-Item dist\BossToolKiller.exe BossToolKiller.exe
          Copy-Item dist\BossToolKiller_x86.exe BossToolKiller_x86.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: BossTool ${{ github.ref_name }}
          body: |
            BossTool v4.23 focuses on state consistency and safe failure handling.

            Changes:
            - Serialize boss-mode transitions and verify the target IP before committing mode state.
            - Restore and verify the work IP before allowing the process to exit.
            - Keep vault state when eject fails and prevent BitLocker credentials from appearing in logs.
            - Store vault passwords only for the current process session.
            - Manage only the Notepad instance started by BossTool and preserve unsaved documents.
            - Stop deleting unrelated browser, Explorer, Recent, RDP history, and system policies.
            - Treat child-process timeouts as failures instead of successful completion.

            Compatibility note: the vault password must be entered again after each program restart.
          files: |
            BossTool.exe
            BossTool_x86.exe
            FixACLUltimate.exe
            FixACLUltimate_x86.exe
            BossToolKiller.exe
            BossToolKiller_x86.exe
            BossTool-${{ github.ref_name }}-windows.zip
