name: Build BossTool

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            msystem: UCRT64
            packages: mingw-w64-ucrt-x86_64-gcc
            boss_exe: BossTool.exe
            acl_exe: FixACLUltimate.exe
            killer_exe: BossToolKiller.exe
          - arch: x86
            msystem: MINGW32
            packages: mingw-w64-i686-gcc
            boss_exe: BossTool_x86.exe
            acl_exe: FixACLUltimate_x86.exe
            killer_exe: BossToolKiller_x86.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.packages }}

      - name: Build ${{ matrix.arch }} binaries
        shell: msys2 {0}
        run: |
          gcc -O2 -municode -mwindows -o "${{ matrix.boss_exe }}" main.c -lws2_32 -liphlpapi -ladvapi32 -lshell32 -lcomctl32 -lshlwapi -lole32 -static
          gcc -O2 -municode -mwindows -o "${{ matrix.acl_exe }}" fix_acl_ultimate.c -ladvapi32 -lshell32 -static
          gcc -O2 -municode -mwindows -o "${{ matrix.killer_exe }}" BossToolKiller.c -ladvapi32 -lshell32 -luser32 -static

      - name: Upload ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossTool-CI-${{ matrix.arch }}
          path: |
            ${{ matrix.boss_exe }}
            ${{ matrix.acl_exe }}
            ${{ matrix.killer_exe }}
