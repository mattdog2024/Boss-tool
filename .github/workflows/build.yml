name: Build BossTool

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v2
      with:
        arch: ${{ matrix.arch }}

    - name: Build BossTool
      shell: cmd
      run: |
        cl /nologo /W3 /O2 /Fe:BossTool.exe main.c user32.lib shell32.lib ole32.lib advapi32.lib iphlpapi.lib ws2_32.lib shlwapi.lib version.lib netapi32.lib

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BossTool-${{ matrix.arch }}
        path: BossTool.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Download x64 artifact
      uses: actions/download-artifact@v4
      with:
        name: BossTool-x64
        path: release

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release/BossTool.exe
        name: BossTool ${{ github.ref_name }}
        generate_release_notes: true
